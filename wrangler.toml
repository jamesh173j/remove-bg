# Cloudflare Pages + Workers 配置文件
# 部署命令: npx wrangler pages deploy .

name = "remove-bg"
compatibility_date = "2024-01-01"

# 环境变量（在 Cloudflare Dashboard 中设置）
# REMOVE_BG_API_KEY - 你的 remove.bg API Key

# KV 命名空间配置（用于存储用户数据）
[[kv_namespaces]]
binding = "USER_DATA_KV"
id = "your_kv_namespace_id_here"
preview_id = "your_preview_kv_namespace_id_here"
