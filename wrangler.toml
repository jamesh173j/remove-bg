# Cloudflare Pages 配置文件
# 部署命令: npx wrangler pages deploy .

name = "remove-bg"
compatibility_date = "2024-01-01"

# 环境变量需要在 Cloudflare Dashboard 中设置：
# REMOVE_BG_API_KEY - 你的 remove.bg API Key
# REMOVE_BG_KV - KV 命名空间（用于限流，可选）

[[kv_namespaces]]
binding = "REMOVE_BG_KV"
id = "your_kv_namespace_id_here"
